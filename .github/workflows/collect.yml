name: "📊 Bybit 시계열 데이터 수집"

on:
  schedule:
    # 매시간 정각 (UTC) = KST 매시간 9분 (UTC+9)
    - cron: "0 * * * *"
  workflow_dispatch:
    # 수동 실행 허용 (테스트용)

permissions:
  contents: write  # CSV 커밋을 위해 필요

jobs:
  collect:
    name: "데이터 수집 & 기록"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📥 레포지토리 체크아웃"
        uses: actions/checkout@v4
        with:
          # 커밋 충돌 방지를 위해 항상 최신 상태로 가져오기
          fetch-depth: 1

      - name: "🐍 Python 설정"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "🔍 데이터 수집 실행"
        run: python collect.py

      - name: "💾 CSV 변경사항 커밋 & 푸시"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경사항이 있을 때만 커밋
          if git diff --quiet data/timeseries.csv 2>/dev/null || [ ! -f data/timeseries.csv ]; then
            echo "변경사항 없음, 스킵"
          else
            KST_TIME=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git add data/timeseries.csv
            git commit -m "data: hourly snapshot @ ${KST_TIME}"
            git push
            echo "✅ 커밋 완료: ${KST_TIME}"
          fi
